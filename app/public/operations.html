<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./shell.css">
  <script type="importmap">{ "imports": {
    "react": "https://esm.sh/react",
    "react/jsx-runtime": "https://esm.sh/react/jsx-runtime",
    "react-dom": "https://esm.sh/react-dom",
    "react-dom/client": "https://esm.sh/react-dom/client"
  }}</script>
</head>

<body>

  <script src="//cdn.jsdelivr.net/npm/@babel/standalone"></script>
  <script type="text/jsx" data-type="module">
    import ForceGraph2D from 'https://esm.sh/react-force-graph-2d?external=react';
    import React from 'react';
    import { createRoot } from 'react-dom/client';
    import { forceCollide, forceRadial } from 'https://esm.sh/d3-force';
    import { NavBar, SearchBox, ThemeToggle, DetailHeader, useTheme, setupLayout, useVizPaneSize, useGraphPhysics, RENDER, PALETTE, drawLabel, linkEnds, useGraphState, useBraveClickFix, CornerPanel, nodePointerAreaPaint, paintNodeColors, FONT_MONO } from './shell.js';

    setupLayout();

    // ─── constants ───────────────────────────────────────────────────────────

    const COLORS = {
      operation: PALETTE.ENTRY,
      decision:  PALETTE.LEAF,
      file:      PALETTE.CONNECTOR,
    };

    const NODE_TYPES = ['operation', 'decision', 'file'];

    const TYPE_LABELS = {
      operation: 'operations',
      decision:  'model',
      file:      'files',
    };

    const dotRadius = node =>
      node.type === 'operation' ? 6 : node.type === 'file' ? 3 : 4;

    // ─── data prep ───────────────────────────────────────────────────────────

    const raw = await fetch('./operations.json').then(r => r.json());

    const ids = new Set(raw.nodes.map(n => n.id));
    raw.links = raw.links.filter(l => ids.has(l.source) && ids.has(l.target));

    const INNER_R = 70;
    const OUTER_R = 160;

    const ops   = raw.nodes.filter(n => n.type === 'operation').sort((a, b) => a.id.localeCompare(b.id));
    const outer = raw.nodes.filter(n => n.type !== 'operation').sort((a, b) => a.id.localeCompare(b.id));

    ops.forEach((n, i) => {
      const angle = (2 * Math.PI * i) / ops.length - Math.PI / 2;
      n.fx = Math.cos(angle) * INNER_R;
      n.fy = Math.sin(angle) * INNER_R;
    });

    const decisions = outer.filter(n => n.type === 'decision');
    const files     = outer.filter(n => n.type === 'file');

    // decisions: top half  (-π → 0), files: bottom half (0 → π)
    decisions.forEach((n, i) => {
      const angle = -Math.PI + Math.PI * i / Math.max(decisions.length - 1, 1);
      n.x = Math.cos(angle) * OUTER_R;
      n.y = Math.sin(angle) * OUTER_R;
    });
    files.forEach((n, i) => {
      const angle = Math.PI * i / Math.max(files.length - 1, 1);
      n.x = Math.cos(angle) * OUTER_R;
      n.y = Math.sin(angle) * OUTER_R;
    });

    // ── sibling repulsion: pre-compute pairs that share an operation parent ──
    const opIds = new Set(ops.map(n => n.id));
    const opChildren = new Map();
    raw.links.forEach(l => {
      if (opIds.has(l.source)) { if (!opChildren.has(l.source)) opChildren.set(l.source, []); opChildren.get(l.source).push(l.target); }
      if (opIds.has(l.target)) { if (!opChildren.has(l.target)) opChildren.set(l.target, []); opChildren.get(l.target).push(l.source); }
    });
    const siblingPairs = [];
    opChildren.forEach(children => {
      for (let i = 0; i < children.length; i++)
        for (let j = i + 1; j < children.length; j++)
          siblingPairs.push([children[i], children[j]]);
    });


    // ─── label helpers ───────────────────────────────────────────────────────

    const nodeLabel = node => {
      if (node.type !== 'file') return node.id.replaceAll('-', ' ');
      const parts = node.id.split('/').filter(Boolean);
      if (parts.length <= 2) return node.id;
      return `${parts[0]}/\u2026/${parts[parts.length - 1]}`;
    };

    // ─── detail pane helpers ─────────────────────────────────────────────────

    function ConnectedList({ label, items }) {
      if (!items?.length) return null;
      return <>
        <div className="info-label">{label}</div>
        <div style={{ margin: '4px 0 8px' }}>
          {items.map((item, i) => (
            <div key={i} className="info-text"
              style={{ fontFamily: FONT_MONO, fontSize: 11, wordBreak: 'break-all', margin: '2px 0' }}>
              {item}
            </div>
          ))}
        </div>
      </>;
    }

    function IdlePanel({ theme }) {
      return (
        <div className={`corner-panel${theme === 'light' ? ' light' : ''}`}>
          <h1 style={{ margin: '0 0 12px', padding: 0, fontSize: 16, fontWeight: 400, lineHeight: 1.3, color: '#fff' }}>
            Platform Operations
          </h1>
          <p style={{ margin: '0 0 14px', fontSize: 14, color: 'rgba(155,175,215,0.75)', letterSpacing: '0.03em' }}>
            Explore standardized platform operations
          </p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            <p className="info-text" style={{ margin: 0 }}>This graph maps Gazelle's standard operations — the files each one touches and the design decisions that shape it.</p>
            <hr style={{ border: 'none', borderTop: '1px solid rgba(155,175,215,0.15)', margin: '4px 0' }} />
            <p className="info-text" style={{ margin: 0 }}><span style={{ color: PALETTE.ENTRY }}>Yellow</span> = operations</p>
            <p className="info-text" style={{ margin: 0 }}><span style={{ color: PALETTE.LEAF }}>Blue</span> = design decisions</p>
            <p className="info-text" style={{ margin: 0 }}><span style={{ color: PALETTE.CONNECTOR }}>Green</span> = file paths</p>
            <hr style={{ border: 'none', borderTop: '1px solid rgba(155,175,215,0.15)', margin: '4px 0' }} />
            <p className="info-text" style={{ margin: 0 }}>This entire platform, code and knowledge graph included, is on <a href="https://github.com/orgs/gazelle-cloud/" target="_blank" rel="noopener noreferrer" style={{ color: 'rgba(155,175,215,0.85)', textDecoration: 'none', borderBottom: '1px solid rgba(155,175,215,0.3)' }}>GitHub</a>.</p>
          </div>
        </div>
      );
    }

    function NodeDetail({ node, links, theme }) {
      const connected = links
        .filter(l => { const [s, t] = linkEnds(l); return s === node.id || t === node.id; })
        .map(l => {
          const [s, t] = linkEnds(l);
          return { id: s === node.id ? t : s, type: l.type };
        });

      const reasoning = connected.filter(c => c.type === 'reasoning').map(c => c.id);
      const files     = connected.filter(c => c.type === 'file').map(c => c.id);
      const other     = connected.filter(c => c.type !== 'reasoning' && c.type !== 'file').map(c => c.id);

      return <>
        <DetailHeader typeLabel={TYPE_LABELS[node.type]} nodeId={node.id.replaceAll('-', ' ')} theme={theme} />
        <ConnectedList label="Reasoning (decisions)" items={reasoning} />
        <ConnectedList label="Files" items={files} />
        <ConnectedList label="Connected" items={other} />
      </>;
    }

    // ─── component ───────────────────────────────────────────────────────────

    function Graph() {
      const fgRef = React.useRef();
      const { theme, toggleTheme, bgColor } = useTheme();

      const size = useVizPaneSize(fgRef);

      const { activeId, graph, activeNode, neighbours, setHoveredId, setFocusedId, onNodeClick, onBackgroundClick, searchQuery, setSearchQuery, searchMatchIds } = useGraphState(raw, NODE_TYPES);
      const handleBackgroundClick = useBraveClickFix(fgRef, graph.nodes, dotRadius, setFocusedId, onBackgroundClick);

      const [searchFocused, setSearchFocused] = React.useState(false);

      const physicsProps = useGraphPhysics(fgRef, graph, fg => {
        fg.d3Force('link').strength(0);
        fg.d3Force('charge').strength(n => n.type === 'operation' ? 0 : -120);
        fg.d3Force('collision', forceCollide(n => dotRadius(n) + 8));
        fg.d3Force('radial', forceRadial(OUTER_R, 0, 0)
          .strength(n => n.type === 'operation' ? 0 : 0.8));
        const halfForce = (() => {
          let nodes = [];
          const force = alpha => {
            for (const n of nodes) {
              if (n.type === 'operation') continue;
              // decisions attracted to top (-π/2), files to bottom (π/2)
              const target = n.type === 'file' ? Math.PI / 2 : -Math.PI / 2;
              let dAngle = target - Math.atan2(n.y, n.x);
              if (dAngle >  Math.PI) dAngle -= 2 * Math.PI;
              if (dAngle < -Math.PI) dAngle += 2 * Math.PI;
              const ang = Math.atan2(n.y, n.x);
              const f = alpha * 0.3 * dAngle;
              n.vx += -Math.sin(ang) * f;
              n.vy +=  Math.cos(ang) * f;
            }
          };
          force.initialize = ns => { nodes = ns; };
          return force;
        })();
        fg.d3Force('half-pull', halfForce);
        const siblingForce = (() => {
          let pairs = [];
          const force = alpha => {
            for (const [a, b] of pairs) {
              let dAngle = Math.atan2(a.y, a.x) - Math.atan2(b.y, b.x);
              if (dAngle >  Math.PI) dAngle -= 2 * Math.PI;
              if (dAngle < -Math.PI) dAngle += 2 * Math.PI;
              const sign = Math.sign(dAngle) || 1;
              const f = alpha * 0.8 / (Math.abs(dAngle) + 0.05);
              // push purely along each node's tangent — no radial component
              const angA = Math.atan2(a.y, a.x);
              a.vx += sign * -Math.sin(angA) * f;
              a.vy += sign *  Math.cos(angA) * f;
              const angB = Math.atan2(b.y, b.x);
              b.vx -= sign * -Math.sin(angB) * f;
              b.vy -= sign *  Math.cos(angB) * f;
            }
          };
          force.initialize = nodes => {
            const byId = new Map(nodes.map(n => [n.id, n]));
            pairs = siblingPairs.map(([idA, idB]) => [byId.get(idA), byId.get(idB)]).filter(([a, b]) => a && b);
          };
          return force;
        })();
        fg.d3Force('siblings', siblingForce);
      });

      const linkColor = React.useCallback(l => {
        const dim    = theme === 'dark' ? 'rgba(180,195,225,0.28)' : 'rgba(80,80,100,0.15)';
        const active = theme === 'dark' ? 'rgba(235,242,255,0.95)' : 'rgba(30,30,50,0.75)';
        const faded  = theme === 'dark' ? 'rgba(180,180,180,0.04)' : 'rgba(80,80,100,0.04)';
        if (!activeId) return dim;
        const [s, t] = linkEnds(l);
        return (s === activeId || t === activeId) ? active : faded;
      }, [activeId, theme]);

      const paintNode = React.useCallback((node, ctx, globalScale) => {
        const isActive    = node.id === activeId;
        const isNeighbour = neighbours?.has(node.id);
        const isMatch     = searchMatchIds.has(node.id);
        const dimmed      = activeId
          ? !isActive && !isNeighbour
          : searchMatchIds.size > 0 && !isMatch;
        const r           = dotRadius(node) / globalScale;

        const { activeColor, backdrop } = paintNodeColors(theme);

        ctx.globalAlpha = dimmed ? RENDER.dimmedAlpha : 1;
        ctx.beginPath();
        ctx.arc(node.x, node.y, r, 0, 2 * Math.PI);
        ctx.fillStyle = isActive ? activeColor : COLORS[node.type];
        ctx.fill();

        const isRim     = true;
        const showLabel = node.type === 'operation' || isActive || isNeighbour || isMatch;
        if (showLabel) {
          const gap = r + RENDER.labelGap / globalScale;
          let lx, ly, align;
          if (isRim) {
            const angle = Math.atan2(node.y, node.x);
            lx    = node.x + Math.cos(angle) * gap;
            ly    = node.y + Math.sin(angle) * gap;
            align = Math.cos(angle) >= 0 ? 'left' : 'right';
          } else {
            lx    = node.x + gap;
            ly    = node.y;
            align = 'left';
          }
          drawLabel(ctx, nodeLabel(node), lx, ly, align, isRim ? RENDER.labelFontSize + 1 : RENDER.labelFontSize, globalScale,
            isActive ? activeColor : COLORS[node.type] ?? '#ccc', backdrop);
        }

        ctx.globalAlpha = 1;
        node.__r = r;
      }, [activeId, neighbours, searchMatchIds, theme]);

      return <>
        <NavBar activeHref="./operations.html">
          <SearchBox nodes={graph.nodes} searchQuery={searchQuery}
                     setSearchQuery={setSearchQuery} setFocusedId={setFocusedId}
                     onFocus={() => setSearchFocused(true)}
                     onBlur={() => setSearchFocused(false)} />
          <ThemeToggle theme={theme} toggleTheme={toggleTheme} />
        </NavBar>

        {!activeNode && !searchFocused && <IdlePanel theme={theme} />}

        {!searchFocused && <CornerPanel node={activeNode} theme={theme}>
          <NodeDetail node={activeNode} links={graph.links} theme={theme} />
        </CornerPanel>}

        <ForceGraph2D
          ref={fgRef}
          width={size.width}
          height={size.height}
          graphData={graph}
          linkColor={linkColor}
          linkDirectionalArrowLength={0}
          {...physicsProps}
          cooldownTime={4000}
          backgroundColor={bgColor}
          onNodeHover={node => setHoveredId(node?.id ?? null)}
          onNodeClick={onNodeClick}
          onBackgroundClick={handleBackgroundClick}
          nodeCanvasObject={paintNode}
          nodePointerAreaPaint={nodePointerAreaPaint}
        />
      </>;
    }

    // ─── mount ───────────────────────────────────────────────────────────────

    createRoot(document.getElementById('graph')).render(<Graph />);
  </script>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="8d6f8fcd-8e1a-4eb4-8c64-1b32c60e82cd"></script>
</body>
</html>
