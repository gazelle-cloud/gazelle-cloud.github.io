<!DOCTYPE html>
<html>
<head>
  <style>
    html, body { margin: 0; height: 100%; }
    body { background: #1a1b26; }
    #graph { width: 100vw; height: 100vh; }
    #filters {
      position: absolute;
      top: 14px; left: 14px;
      display: flex; gap: 8px; align-items: flex-start;
      z-index: 10;
    }
    .nav-stack { display: flex; flex-direction: column; gap: 8px; }
    .nav-link {
      font: 12px sans-serif;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      padding: 5px 12px;
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      transition: color 0.15s, border-color 0.15s;
    }
    .nav-link:hover { color: rgba(255,255,255,0.75); border-color: rgba(255,255,255,0.35); }
    .nav-active { color: rgba(255,255,255,0.75) !important; border-color: rgba(255,255,255,0.35) !important; pointer-events: none; }
    .chip {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 20px; border: 1.5px solid;
      font: 12px sans-serif; cursor: pointer; user-select: none;
      transition: opacity 0.15s;
    }
    .chip.off { opacity: 0.3; }
    .chip-dot { width: 8px; height: 8px; border-radius: 50%; }
    #info-panel {
      position: fixed;
      top: 14px; right: 14px;
      width: 300px;
      max-height: calc(100vh - 28px);
      overflow-y: auto;
      background: rgba(26,27,38,0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 14px 16px;
      z-index: 10;
      pointer-events: auto;
      font: 13px/1.6 sans-serif;
    }
    .info-id {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
      margin-bottom: 10px;
    }
    .info-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #555;
      margin: 10px 0 3px;
    }
    .info-text { margin: 0; color: #bbb; }
    .info-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-family: monospace;
      color: #1a1b26;
      margin-top: 2px;
    }
  </style>

  <script type="importmap">{ "imports": {
    "react": "https://esm.sh/react",
    "react-dom": "https://esm.sh/react-dom",
    "react-dom/client": "https://esm.sh/react-dom/client"
  }}</script>
</head>

<body>
  <div id="filters"></div>
  <div id="graph"></div>

  <script src="//cdn.jsdelivr.net/npm/@babel/standalone"></script>
  <script type="text/jsx" data-type="module">
    import ForceGraph2D from 'https://esm.sh/react-force-graph-2d?external=react';
    import React from 'react';
    import { createRoot } from 'react-dom/client';
    import { forceCollide, forceX, forceY } from 'https://esm.sh/d3-force';

    // ─── constants ───────────────────────────────────────────────────────────

    const COLORS = {
      workflow:       '#3dba7f',
      'bicep-entry':  '#f0a500',
      'bicep-module': '#4e8ef7',
    };

    const NODE_TYPES = ['workflow', 'bicep-entry', 'bicep-module'];

    const TYPE_LABELS = {
      workflow:       'github-workflows',
      'bicep-entry':  'main-bicep',
      'bicep-module': 'bicep-modules',
    };

    const vtype = n => n.type === 'bicep' ? `bicep-${n.role}` : n.type;

    // Relationship → arrow colour
    const REL_COLORS = {
      implements: 'rgba(61,186,127,0.7)',
      calls:      'rgba(192,132,252,0.7)',
      deploys:    'rgba(240,165,0,0.7)',
      uses:       'rgba(78,142,247,0.7)',
    };

    const dotRadius = node => {
      if (node.type === 'workflow') return 5;
      if (node.type === 'bicep' && node.role === 'entry') return 4 + node.__weight * 5;
      return 2 + node.__weight * 5;
    };

    // ─── jobs formatter ──────────────────────────────────────────────────────

    function highlightJobs(raw) {
      return raw.split('\n').map(line => {
        if (line.startsWith('job:')) {
          const label = esc(line.slice(4).trim());
          return `<span style="color:#3dba7f;font-weight:600">job</span><span style="color:#94a3b8">:</span> <span style="color:#e2e8f0">${label}</span>`;
        }
        return `<span style="color:#64748b">${esc(line)}</span>`;
      }).join('\n');
    }

    // ─── bicep syntax highlighter ────────────────────────────────────────────

    const BICEP_KEYWORDS = new Set([
      'module','resource','param','var','output','for','in','if','existing',
      'scope','params','targetScope','name','type','import','using','dependsOn',
    ]);
    const BICEP_TYPES = new Set(['string','int','bool','object','array']);

    function esc(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function highlightBicep(raw) {
      const code = raw.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      let out = '', i = 0;
      while (i < code.length) {
        // single-line comment
        if (code[i] === '/' && code[i + 1] === '/') {
          const end = code.indexOf('\n', i);
          const chunk = end === -1 ? code.slice(i) : code.slice(i, end);
          out += `<span style="color:#4b5563">${esc(chunk)}</span>`;
          i += chunk.length; continue;
        }
        // single-quoted string
        if (code[i] === "'") {
          let j = i + 1;
          while (j < code.length && code[j] !== "'") j++;
          j++;
          out += `<span style="color:#86efac">${esc(code.slice(i, j))}</span>`;
          i = j; continue;
        }
        // identifier → keyword / type / plain
        if (/[a-zA-Z_]/.test(code[i])) {
          let j = i;
          while (j < code.length && /\w/.test(code[j])) j++;
          const word = code.slice(i, j);
          if (BICEP_KEYWORDS.has(word))
            out += `<span style="color:#f0a500;font-weight:600">${esc(word)}</span>`;
          else if (BICEP_TYPES.has(word))
            out += `<span style="color:#38bdf8">${esc(word)}</span>`;
          else
            out += esc(word);
          i = j; continue;
        }
        out += esc(code[i]); i++;
      }
      return out;
    }

    // ─── data prep ───────────────────────────────────────────────────────────

    fetch('./codebase.json').then(r => r.json()).then(raw => {
      const ids = new Set(raw.nodes.map(n => n.id));
      raw.links = raw.links.filter(l => ids.has(l.source) && ids.has(l.target));

      // in-degree → weight (0..1)
      const inDeg = Object.fromEntries(raw.nodes.map(n => [n.id, 0]));
      raw.links.forEach(l => { inDeg[l.target] = (inDeg[l.target] ?? 0) + 1; });
      const maxDeg = Math.max(1, ...Object.values(inDeg));
      raw.nodes.forEach(n => { n.__weight = (inDeg[n.id] ?? 0) / maxDeg; });

      // fixed left-to-right workflow order
      const WF_ORDER = [
        'template-Management-Groups',
        'template-access-control',
        'template-Azure-Policy',
        'template-landing-zones',
      ];
      const wfSpacing = 130;
      const wfOffset  = (WF_ORDER.length - 1) / 2 * wfSpacing;
      WF_ORDER.forEach((id, i) => {
        const node = raw.nodes.find(n => n.id === id);
        if (node) node.__xTarget = i * wfSpacing - wfOffset;
      });

      // propagate X target from workflow → entry bicep (straight stem, small offset for siblings)
      const wfChildren = {};
      raw.links.forEach(l => {
        const srcId = l.source?.id ?? l.source;
        const tgtId = l.target?.id ?? l.target;
        const src = raw.nodes.find(n => n.id === srcId);
        const tgt = raw.nodes.find(n => n.id === tgtId);
        if (src?.type === 'workflow' && tgt?.role === 'entry')
          (wfChildren[srcId] = wfChildren[srcId] ?? []).push(tgt);
      });
      Object.entries(wfChildren).forEach(([wfId, entries]) => {
        const wf = raw.nodes.find(n => n.id === wfId);
        const baseX = wf?.__xTarget ?? 0;
        entries.forEach((n, i) => {
          const offset = entries.length > 1 ? (i - (entries.length - 1) / 2) * 35 : 0;
          n.__xTarget = baseX + offset;
        });
      });

      // pre-position + pin workflows (same logic as main page rim nodes)
      raw.nodes.forEach(n => {
        if (n.type === 'workflow') {
          n.x = n.__xTarget ?? 0; n.y = 220;
          n.fx = n.x; n.fy = n.y;          // pinned — bounding box stable from tick 0
        } else if (n.role === 'entry') {
          n.x = n.__xTarget ?? 0; n.y = 60;
        } else {
          n.x = (Math.random() - 0.5) * 380; n.y = -220;
        }
      });

      // ─── component ─────────────────────────────────────────────────────────

      function Graph({ raw }) {
        const fgRef = React.useRef();

        const [size, setSize] = React.useState({ width: window.innerWidth, height: window.innerHeight });
        React.useEffect(() => {
          const handle = () => setSize({ width: window.innerWidth, height: window.innerHeight });
          window.addEventListener('resize', handle);
          return () => window.removeEventListener('resize', handle);
        }, []);
        React.useEffect(() => { fgRef.current?.zoomToFit(400, 40); }, [size]);

        const [visible,   setVisible]   = React.useState(new Set(NODE_TYPES));
        const [hoveredId, setHoveredId] = React.useState(null);
        const [focusedId, setFocusedId] = React.useState(null);
        const hoverTimer = React.useRef(null);

        const activeId = focusedId ?? hoveredId;

        const graph = React.useMemo(() => {
          const visIds = new Set(raw.nodes.filter(n => visible.has(vtype(n))).map(n => n.id));
          return {
            nodes: raw.nodes.filter(n => visible.has(vtype(n))),
            links: raw.links.filter(l => {
              const s = l.source?.id ?? l.source;
              const t = l.target?.id ?? l.target;
              return visIds.has(s) && visIds.has(t);
            }),
          };
        }, [visible]);

        const activeNode = React.useMemo(() =>
          activeId ? graph.nodes.find(n => n.id === activeId) : null,
        [activeId, graph.nodes]);

        const neighbours = React.useMemo(() => {
          if (!activeId) return null;
          const set = new Set([activeId]);
          graph.links.forEach(l => {
            const s = l.source?.id ?? l.source;
            const t = l.target?.id ?? l.target;
            if (s === activeId) set.add(t);
            if (t === activeId) set.add(s);
          });
          return set;
        }, [activeId, graph.links]);

        React.useEffect(() => {
          const fg = fgRef.current;
          if (!fg) return;
          fg.d3Force('charge').strength(-200);
          fg.d3Force('link')
            .distance(l => {
              const s = l.source?.type ?? '';
              return s === 'workflow' ? 40 : 70;
            })
            .strength(0.4);
          fg.d3Force('collision', forceCollide(n => dotRadius(n) + 5));
          // fountain: lock each tier to its vertical band
          fg.d3Force('y-tier', forceY(n => {
            if (n.type === 'workflow') return 220;
            if (n.role === 'entry')   return 0;
            return -220;
          }).strength(n => {
            if (n.type === 'workflow') return 0.8;
            if (n.role === 'entry')   return 0.5;
            return 0.25;
          }));
          // workflows + entry bicep pulled to their X target (straight stem)
          fg.d3Force('x-stem', forceX(n => n.__xTarget ?? 0)
            .strength(n => n.type === 'workflow' ? 0.8 : n.role === 'entry' ? 0.6 : 0));
          fg.d3ReheatSimulation();
          setTimeout(() => fg.zoomToFit(400, 40), 100);
          setTimeout(() => fg.zoomToFit(400, 40), 1500);
        }, [graph]);

        const linkColor = React.useCallback(l => {
          if (!activeId) {
            const rel = l.relationship;
            return REL_COLORS[rel]?.replace('0.7', '0.15') ?? 'rgba(180,180,180,0.1)';
          }
          const s = l.source?.id ?? l.source;
          const t = l.target?.id ?? l.target;
          if (s === activeId || t === activeId) {
            const rel = l.relationship;
            return REL_COLORS[rel] ?? 'rgba(255,255,255,0.85)';
          }
          return 'rgba(180,180,180,0.04)';
        }, [activeId]);

        const paintNode = React.useCallback((node, ctx, globalScale) => {
          const isActive    = node.id === activeId;
          const isNeighbour = neighbours?.has(node.id);
          const dimmed      = activeId && !isActive && !isNeighbour;
          const r           = dotRadius(node) / globalScale;

          ctx.globalAlpha = dimmed ? 0.08 : 1;
          ctx.beginPath();
          ctx.arc(node.x, node.y, r, 0, 2 * Math.PI);
          ctx.fillStyle = isActive ? '#fff' : COLORS[vtype(node)];
          ctx.fill();

          const showLabel = node.type === 'workflow' || isActive || isNeighbour;
          if (showLabel) {
            const fs  = node.type === 'workflow' ? 11 / globalScale : 11 / globalScale;
            ctx.font  = `${fs}px Sans-Serif`;
            const tw  = ctx.measureText(node.id).width;
            const p   = 4 / globalScale;
            const gap = r + 5 / globalScale;

            let lx, ly, align;
            if (node.type === 'workflow') {
              // grounded below the dot, centred
              lx    = node.x;
              ly    = node.y + gap + fs;
              align = 'center';
            } else {
              lx    = node.x + gap;
              ly    = node.y;
              align = 'left';
            }

            const bgX = align === 'center' ? lx - tw / 2 - p : lx - p;
            ctx.fillStyle = 'rgba(26,27,38,0.9)';
            ctx.fillRect(bgX, ly - fs / 2 - p, tw + p * 2, fs + p * 2);
            ctx.fillStyle    = isActive ? '#fff' : COLORS[vtype(node)] ?? '#ccc';
            ctx.textAlign    = align;
            ctx.textBaseline = 'middle';
            ctx.fillText(node.id, lx, ly);
          }

          ctx.globalAlpha = 1;
          node.__r = r;
        }, [activeId, neighbours]);

        const toggleType = type => {
          setFocusedId(null);
          setVisible(prev => {
            const next = new Set(prev);
            next.has(type) ? next.delete(type) : next.add(type);
            return next;
          });
        };

        const badgeColor = node => COLORS[vtype(node)] ?? '#888';

        return <>
          <div id="filters">
            <div className="nav-stack">
              <a className="nav-link" href="./index.html">Home</a>
              <span className="nav-link nav-active">Azure deployments</span>
            </div>
            {NODE_TYPES.map(type => (
              <div key={type}
                className={`chip${visible.has(type) ? '' : ' off'}`}
                style={{ borderColor: COLORS[type], color: COLORS[type] }}
                onClick={() => toggleType(type)}
              >
                <div className="chip-dot" style={{ background: COLORS[type] }} />
                {TYPE_LABELS[type]}
              </div>
            ))}
          </div>

          {activeNode && (
            <div id="info-panel">
              <div className="info-id">{TYPE_LABELS[vtype(activeNode)]}</div>
              <p className="info-text" style={{ color: '#fff', margin: '0 0 8px', fontWeight: 600 }}>{activeNode.id}</p>

              {activeNode.description && <>
                <div className="info-label">Description</div>
                <p className="info-text">{activeNode.description}</p>
              </>}

              {activeNode.jobs && <>
                <div className="info-label">Jobs</div>
                <pre style={{
                  margin: '4px 0 0', padding: '10px 12px',
                  background: 'rgba(0,0,0,0.35)',
                  border: '1px solid rgba(255,255,255,0.06)',
                  borderRadius: 6,
                  fontFamily: 'monospace', fontSize: 10, lineHeight: 1.6,
                  color: '#e2e8f0', whiteSpace: 'pre', overflowX: 'auto',
                }}
                  dangerouslySetInnerHTML={{ __html: highlightJobs(activeNode.jobs) }}
                />
              </>}

              {activeNode.path && <>
                <div className="info-label">Path</div>
                <p className="info-text" style={{ fontFamily: 'monospace', fontSize: 11, wordBreak: 'break-all' }}>
                  {activeNode.path}
                </p>
              </>}

              {activeNode.snippet && <>
                <div className="info-label">Snippet</div>
                <pre style={{
                  margin: '4px 0 0', padding: '10px 12px',
                  background: 'rgba(0,0,0,0.35)',
                  border: '1px solid rgba(255,255,255,0.06)',
                  borderRadius: 6,
                  fontFamily: 'monospace', fontSize: 10, lineHeight: 1.6,
                  color: '#e2e8f0', whiteSpace: 'pre', overflowX: 'auto',
                }}
                  dangerouslySetInnerHTML={{ __html: highlightBicep(activeNode.snippet) }}
                />
              </>}

              {activeNode.inputs && <>
                <div className="info-label">Inputs</div>
                <pre style={{
                  margin: '4px 0 0', padding: '10px 12px',
                  background: 'rgba(0,0,0,0.35)',
                  border: '1px solid rgba(255,255,255,0.06)',
                  borderRadius: 6,
                  fontFamily: 'monospace', fontSize: 10, lineHeight: 1.6,
                  color: '#e2e8f0', whiteSpace: 'pre', overflowX: 'auto',
                }}
                  dangerouslySetInnerHTML={{ __html: highlightBicep(activeNode.inputs) }}
                />
              </>}
            </div>
          )}

          <ForceGraph2D
            ref={fgRef}
            width={size.width}
            height={size.height}
            graphData={graph}
            backgroundColor="#1a1b26"
            linkColor={linkColor}
            linkWidth={l => {
              if (!activeId) return 0.5;
              const s = l.source?.id ?? l.source;
              const t = l.target?.id ?? l.target;
              return (s === activeId || t === activeId) ? 1.5 : 0.5;
            }}
            linkDirectionalArrowLength={4}
            linkDirectionalArrowRelPos={1}
            linkDirectionalArrowColor={linkColor}
            cooldownTime={1500}
            onEngineStop={() => fgRef.current?.zoomToFit(400, 40)}
            onNodeHover={node => {
              clearTimeout(hoverTimer.current);
              if (node) {
                setHoveredId(node.id);
              } else {
                hoverTimer.current = setTimeout(() => setHoveredId(null), 300);
              }
            }}
            onNodeClick={node => setFocusedId(p => p === node.id ? null : node.id)}
            onBackgroundClick={() => setFocusedId(null)}
            nodeCanvasObject={paintNode}
            nodePointerAreaPaint={(node, color, ctx) => {
              ctx.fillStyle = color;
              ctx.beginPath();
              ctx.arc(node.x, node.y, (node.__r ?? 4) + 4, 0, 2 * Math.PI);
              ctx.fill();
            }}
          />
        </>;
      }

      createRoot(document.getElementById('graph')).render(<Graph raw={raw} />);
    });
  </script>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="8d6f8fcd-8e1a-4eb4-8c64-1b32c60e82cd"></script>
</body>
</html>
