<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="./shell.css">
  <script type="importmap">{ "imports": {
    "react": "https://esm.sh/react",
    "react-dom": "https://esm.sh/react-dom",
    "react-dom/client": "https://esm.sh/react-dom/client"
  }}</script>
</head>

<body>
  <div id="filters"></div>
  <div id="graph"></div>

  <script src="//cdn.jsdelivr.net/npm/@babel/standalone"></script>
  <script type="text/jsx" data-type="module">
    import ForceGraph2D from 'https://esm.sh/react-force-graph-2d?external=react';
    import React from 'react';
    import { createRoot } from 'react-dom/client';
    import { forceCollide, forceRadial } from 'https://esm.sh/d3-force';
    import { NavBar, useGraphResize, normalizeNodeWeights, drawLabel, linkEnds, useGraphState } from './shell.js';

    // ─── constants ───────────────────────────────────────────────────────────

    const COLORS = {
      principle: '#f0a500',
      operation: '#3dba7f',
      decision:  '#4e8ef7',
    };

    const NODE_TYPES = ['principle', 'operation', 'decision'];

    const TYPE_LABELS = {
      principle: 'design-principles',
      operation: 'platform-operations',
      decision:  'design-decisions',
    };

    const dotRadius = node =>
      node.type === 'decision' ? 2 + node.__weight * 7 : 5;

    // ─── data prep ───────────────────────────────────────────────────────────

    const raw = await fetch('./index.json').then(r => r.json());

    raw.nodes = raw.nodes.filter(n => n.type !== 'unknown');
    const ids = new Set(raw.nodes.map(n => n.id));
    raw.links = raw.links.filter(l => ids.has(l.source) && ids.has(l.target));

    normalizeNodeWeights(raw);

    const byType = t => raw.nodes.filter(n => n.type === t);
    const rim = [];
    const principles = byType('principle'), ops = byType('operation');
    for (let i = 0; i < Math.max(principles.length, ops.length); i++) {
      if (principles[i]) rim.push(principles[i]);
      if (ops[i])        rim.push(ops[i]);
    }
    rim.forEach((n, i) => {
      const angle = (2 * Math.PI * i) / rim.length - Math.PI / 2;
      n.fx = Math.cos(angle) * 280;
      n.fy = Math.sin(angle) * 280;
    });

    // ─── component ───────────────────────────────────────────────────────────

    function Graph() {
      const fgRef = React.useRef();

      const size = useGraphResize(fgRef);

      const { visible, activeId, graph, activeNode, neighbours, toggleType, setHoveredId, setFocusedId } = useGraphState(raw, NODE_TYPES);

      React.useEffect(() => {
        const fg = fgRef.current;
        if (!fg) return;
        fg.d3Force('charge').strength(-180);
        fg.d3Force('link').distance(60);
        fg.d3Force('collision', forceCollide(n => dotRadius(n) + 3));
        fg.d3Force('radial', forceRadial(0, 0, 0)
          .strength(n => n.type === 'decision' ? 0.04 + n.__weight * 0.25 : 0));
        fg.d3ReheatSimulation();
        setTimeout(() => fg.zoomToFit(400, 40), 100);
        setTimeout(() => fg.zoomToFit(400, 40), 4500);
      }, [graph]);

      const linkColor = React.useCallback(l => {
        if (!activeId) return 'rgba(180,180,180,0.12)';
        const [s, t] = linkEnds(l);
        return (s === activeId || t === activeId)
          ? 'rgba(255,255,255,0.85)'
          : 'rgba(180,180,180,0.04)';
      }, [activeId]);

      const paintNode = React.useCallback((node, ctx, globalScale) => {
        const isActive    = node.id === activeId;
        const isNeighbour = neighbours?.has(node.id);
        const dimmed      = activeId && !isActive && !isNeighbour;
        const r           = dotRadius(node) / globalScale;

        ctx.globalAlpha = dimmed ? 0.1 : 1;
        ctx.beginPath();
        ctx.arc(node.x, node.y, r, 0, 2 * Math.PI);
        ctx.fillStyle = isActive ? '#fff' : COLORS[node.type];
        ctx.fill();

        const isRim     = node.type === 'principle' || node.type === 'operation';
        const showLabel = isRim || isActive || isNeighbour;
        if (showLabel) {
          const gap = r + 6 / globalScale;
          let lx, ly, align;
          if (isRim) {
            const angle = Math.atan2(node.y, node.x);
            lx    = node.x + Math.cos(angle) * gap;
            ly    = node.y + Math.sin(angle) * gap;
            align = Math.cos(angle) >= 0 ? 'left' : 'right';
          } else {
            lx    = node.x + gap;
            ly    = node.y;
            align = 'left';
          }
          drawLabel(ctx, node.id, lx, ly, align, 12, globalScale,
            isActive ? '#fff' : COLORS[node.type] ?? '#ccc');
        }

        ctx.globalAlpha = 1;
        node.__r = r; // expose to nodePointerAreaPaint for hit-testing
      }, [activeId, neighbours]);

      return <>
        <NavBar activeHref="./index.html">
          {NODE_TYPES.map(type => (
            <div key={type}
              className={`chip${visible.has(type) ? '' : ' off'}`}
              style={{ borderColor: COLORS[type], color: COLORS[type] }}
              onClick={() => toggleType(type)}
            >
              <div className="chip-dot" style={{ background: COLORS[type] }} />
              {TYPE_LABELS[type]}
            </div>
          ))}
        </NavBar>

        {(activeNode?.mechanism || activeNode?.why || activeNode?.description) && (
          <div id="info-panel">
            <div className="info-id">{activeNode.id}</div>
            {activeNode.description && <>
              <div className="info-label">Description</div>
              <p className="info-text">{activeNode.description}</p>
            </>}
            {activeNode.mechanism && <>
              <div className="info-label">Mechanism</div>
              <p className="info-text">{activeNode.mechanism}</p>
            </>}
            {activeNode.why && <>
              <div className="info-label">Why</div>
              <p className="info-text">{activeNode.why}</p>
            </>}
          </div>
        )}

        <ForceGraph2D
          ref={fgRef}
          width={size.width}
          height={size.height}
          graphData={graph}
          backgroundColor="#1a1b26"
          linkColor={linkColor}
          linkWidth={0.5}
            cooldownTime={4000}
          onEngineStop={() => fgRef.current?.zoomToFit(400, 40)}
          onNodeHover={node => setHoveredId(node?.id ?? null)}
          onNodeClick={node => setFocusedId(p => p === node.id ? null : node.id)}
          onBackgroundClick={() => setFocusedId(null)}
          nodeCanvasObject={paintNode}
          nodePointerAreaPaint={(node, color, ctx) => {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(node.x, node.y, (node.__r ?? 4) + 3, 0, 2 * Math.PI);
            ctx.fill();
          }}
        />
      </>;
    }

    // ─── mount ───────────────────────────────────────────────────────────────

    createRoot(document.getElementById('graph')).render(<Graph />);
  </script>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="8d6f8fcd-8e1a-4eb4-8c64-1b32c60e82cd"></script>
</body>
</html>
