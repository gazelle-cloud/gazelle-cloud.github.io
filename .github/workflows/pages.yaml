  name: Deploy to Pages

  on:
    push:
      branches: ["main"]
    workflow_dispatch:

  permissions:
    contents: read
    pages: write
    id-token: write

  concurrency:
    group: "pages"
    cancel-in-progress: false

  jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Checkout data repo
          uses: actions/checkout@v4
          with:
            repository: gazelle-cloud/data
            path: data

        - name: Generate llms-full.txt
          shell: pwsh
          run: ./scripts/generate-llm-full.ps1 -DataPath data/knowledge-graph

        - name: Setup Node
          uses: actions/setup-node@v4
          with:
            node-version: 22
            cache: npm
            cache-dependency-path: site/package-lock.json

        - name: Install dependencies
          run: npm ci
          working-directory: site

        - name: Build
          run: npm run build
          working-directory: site

        - name: Upload artifact
          uses: actions/upload-pages-artifact@v3
          with:
            path: site/dist

    deploy:
      environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}
      runs-on: ubuntu-latest
      needs: build
      steps:
        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@v4
